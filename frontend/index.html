<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <title>AD Lab 3</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
    <style> 
        body { background: #0b0e14; color: #00d2ff; font-family: 'Segoe UI', sans-serif; 
padding: 40px; } 
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid #00d2ff; 
border-radius: 15px; padding: 25px; } 
        .chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.5); border: 
1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; } 
        .form-control, .form-select { background: #1a1d24; border: 1px solid #444; color: 
white; } 
        .form-control:focus { background: #1a1d24; color: white; border-color: #00d2ff; 
box-shadow: none; } 
        .btn-neon { background: transparent; border: 1px solid #00d2ff; color: #00d2ff; 
font-weight: bold; transition: 0.3s; } 
        .btn-neon:hover { background: #00d2ff; color: black; box-shadow: 0 0 15px 
#00d2ff; } 
    </style> 
</head> 
<body> 
    <div class="container glass-card"> 
        <h2 class="text-center mb-4">Conversational Chat bot with Any Files and for 
Web Scraping</h2> 
 
        <div class="row mb-4"> 
            <div class="col-md-6"> 
                <label>System Model</label> 
                <select id="modelSelect" class="form-select"> 
                    <option value="llama3">Llama 3</option> 
                    <option value="gemma">Gemma</option> 
                </select> 
            </div> 
            <div class="col-md-6"> 
                <label>Data Input</label> 
                <div class="input-group"> 
                    <input type="file" id="fileInput" class="form-control"> 
                    <button onclick="uploadFile()" class="btn btn-neon">UPLOAD</button> 
                </div> 
            </div> 
        </div> 
 
        <div id="chatBox" class="chat-box"></div> 
         
        <div class="input-group mb-4"> 
            <input type="text" id="queryInput" class="form-control" placeholder="Ask the 
system..."> 
            <button onclick="askQuestion()" class="btn btn-neon">QUERY</button> 
        </div> 
 
        <div class="mt-5 pt-3 border-top border-secondary"> 
            <h5>Web Scraper</h5> 
            <div class="input-group"> 
                <input type="text" id="urlInput" class="form-control" placeholder="Enter 
URL..."> 
                <button onclick="scrapeURL()" class="btn btn-neon">SCRAPE</button> 
            </div> 
            <div id="scrapeResult" class="mt-3 small text-white-50"></div> 
        </div> 
    </div> 
 
    <script> 
        async function uploadFile() { 
            const file = document.getElementById('fileInput').files[0]; 
            if(!file) return alert("Select a file."); 
            const formData = new FormData(); 
            formData.append('file', file); 
             
            document.getElementById('chatBox').innerHTML += `<p class="text
warning">System: Indexing document...</p>`; 
            const res = await fetch('/upload', { method: 'POST', body: formData }); 
            const data = await res.json(); 
            alert(data.status); 
        } 
 
        async function askQuestion() { 
            const query = document.getElementById('queryInput').value; 
            const model = document.getElementById('modelSelect').value; 
            const chatBox = document.getElementById('chatBox'); 
             
            chatBox.innerHTML += `<p><b>User:</b> ${query}</p>`; 
            const res = await fetch('/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ query, model }) 
            }); 
            const data = await res.json(); 
            chatBox.innerHTML += `<p style="color:white"><b>AI:</b> 
${data.response}</p><hr>`; 
            chatBox.scrollTop = chatBox.scrollHeight; 
        } 
 
        async function scrapeURL() { 
            const url = document.getElementById('urlInput').value; 
            const res = await fetch('/scrape', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ url }) 
            }); 
            const data = await res.json(); 
            document.getElementById('scrapeResult').innerHTML = data.summary; 
        } 
</script> 
</body> 
</html>
